name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    if: ${{ github.repository_owner == 'hugoschool' }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install libconfig++
        run: |
          pacman -Sy --noconfirm libconfig clang

      - name: Build
        timeout-minutes: 2
        run: make -j`nproc`
